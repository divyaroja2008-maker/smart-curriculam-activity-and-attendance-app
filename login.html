<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Login
    </title>

    <style>

        body {

            font-family: Arial;

            background: #f2f2f2;

            display: flex;

            justify-content: center;

            align-items: center;

            height: 100vh;
        }

        .login-box {

            background: white;

            padding: 30px;

            border-radius: 10px;

            width: 300px;

            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2 {

            text-align: center;

            color: blue;
        }

        input,
        button {

            width: 100%;

            padding: 10px;

            margin-top: 10px;

            box-sizing: border-box;

            border-radius: 5px;

            border: 1px solid #ccc;
        }

        button {

            background: blue;

            color: white;

            border: none;

            cursor: pointer;
        }

        button:hover {

            background: darkblue;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h2>
            Admin Login
        </h2>

        <input type="text"
            id="username"
            placeholder="Enter Username">

        <input type="password"
            id="password"
            placeholder="Enter Password">

        <button onclick="login()">
            Login
        </button>

    </div>

    <script>

        function login() {

            let username =
                document.getElementById(
                    "username"
                ).value;

            let password =
                document.getElementById(
                    "password"
                ).value;

            if (
                username === "admin"
                &&
                password === "1234"
            ) {

                localStorage.setItem(
                    "login",
                    "true"
                );

                window.location.href =
                    "index.html";
            }

            else {

                alert(
                    "Invalid Username or Password"
                );
            }
        }

    </script>

</body>

</html>
