<script>

function login() {

    let username =
        document.getElementById(
            "username"
        ).value.trim();

    let password =
        document.getElementById(
            "password"
        ).value.trim();

    if (
        username === "admin" &&
        password === "admin123"
    ) {

        localStorage.setItem(
            "login",
            "true"
        );

        alert(
            "Login Successful"
        );

        window.location.href =
            "index.html";

    } else {

        document.getElementById(
            "msg"
        ).innerHTML =
        "Wrong Username or Password";
    }
}

</script>
