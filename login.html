<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="login-box">

        <h1>Smart Attendance App</h1>

        <input type="text"
            id="username"
            placeholder="Username">

        <input type="password"
            id="password"
            placeholder="Password">

        <button onclick="login()">
            Login
        </button>

        <p id="msg"></p>

    </div>

    <script>

        function login() {

            let username =
                document.getElementById(
                    "username"
                ).value;

            let password =
                document.getElementById(
                    "password"
                ).value;

            if (
                username === "admin"
                &&
                password === "admin123"
            ) {

                localStorage.setItem(
                    "login",
                    "true"
                );

                window.location.href =
                    "index.html";

            } else {

                document.getElementById(
                    "msg"
                ).innerHTML =
                    "Wrong Username or Password";
            }
        }

    </script>

</body>

</html>
