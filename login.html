<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login Page</title>

    <style>

        body {

            margin: 0;

            padding: 0;

            font-family: Arial, sans-serif;

            background:
            linear-gradient(
                135deg,
                #007bff,
                #00c6ff
            );

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;
        }

        .login-box {

            background: white;

            padding: 40px;

            width: 350px;

            border-radius: 15px;

            box-shadow:
            0 0 20px rgba(0,0,0,0.3);

            text-align: center;
        }

        h1 {

            color: #007bff;

            margin-bottom: 30px;
        }

        input {

            width: 100%;

            padding: 12px;

            margin-top: 15px;

            border-radius: 8px;

            border: 1px solid #ccc;

            font-size: 16px;

            box-sizing: border-box;
        }

        button {

            width: 100%;

            padding: 12px;

            margin-top: 20px;

            border: none;

            border-radius: 8px;

            background: #007bff;

            color: white;

            font-size: 16px;

            cursor: pointer;
        }

        button:hover {

            background: #0056b3;
        }

        #message {

            color: red;

            margin-top: 15px;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h1>
            Smart Attendance App
        </h1>

        <input type="text"
            id="username"
            placeholder="Enter Username">

        <input type="password"
            id="password"
            placeholder="Enter Password">

        <button onclick="login()">
            Login
        </button>

        <p id="message"></p>

    </div>

    <script>

        function login() {

            let username =
                document.getElementById(
                    "username"
                ).value;

            let password =
                document.getElementById(
                    "password"
                ).value;

            if (
                username === "admin"
                &&
                password === "admin123"
            ) {

                alert(
                    "Login Successful"
                );

                window.location.href =
                    "index.html";

            } else {

                document.getElementById(
                    "message"
                ).innerHTML =
                    "Invalid Username or Password";
            }
        }

    </script>

</body>

</html>
