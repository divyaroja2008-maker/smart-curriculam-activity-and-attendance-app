<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <style>

        body {

            font-family: Arial;

            background: #f4f4f4;

            display: flex;

            justify-content: center;

            align-items: center;

            height: 100vh;
        }

        .box {

            background: white;

            padding: 30px;

            border-radius: 10px;

            width: 300px;
        }

        input,
        button {

            width: 100%;

            padding: 10px;

            margin-top: 10px;
        }

    </style>

</head>

<body>

    <div class="box">

        <h2>Admin Login</h2>

        <input type="text"
            id="username"
            placeholder="Username">

        <input type="password"
            id="password"
            placeholder="Password">

        <button onclick="login()">
            Login
        </button>

        <p id="msg"></p>

    </div>

    <script>

        function login() {

            let username =
                document.getElementById(
                    "username"
                ).value;

            let password =
                document.getElementById(
                    "password"
                ).value;

            if (
                username === "admin"
                &&
                password === "admin123"
            ) {

                localStorage.setItem(
                    "login",
                    "true"
                );

                window.location.href =
                    "index.html";

            } else {

                document.getElementById(
                    "msg"
                ).innerHTML =
                    "Invalid Login";
            }
        }

    </script>

</body>

</html>
