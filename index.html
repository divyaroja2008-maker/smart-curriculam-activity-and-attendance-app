<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Smart Curriculum Activity Attendance App

</title>

<style>

body{

margin:0;

font-family:Arial;

background:#f2f2f2;

transition:0.3s;

}

.dark-mode{

background:#121212;

color:white;

}

header{

background:#0066ff;

color:white;

padding:20px;

text-align:center;

}

.container{

padding:20px;

}

.dashboard{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:15px;

margin-top:20px;

}

.card{

background:white;

padding:20px;

border-radius:10px;

box-shadow:0 0 10px rgba(0,0,0,0.2);

transition:0.3s;

}

.dark-mode .card{

background:#1f1f1f;

}

.card:hover{

transform:scale(1.03);

}

input,
textarea,
button,
select{

width:100%;

padding:10px;

margin-top:10px;

border-radius:5px;

border:1px solid #ccc;

box-sizing:border-box;

}

button{

background:#0066ff;

color:white;

border:none;

cursor:pointer;

}

button:hover{

background:#0044aa;

}

.notice{

background:orange;

color:white;

padding:10px;

border-radius:5px;

margin-top:15px;

}

.progress{

width:100%;

background:#ddd;

border-radius:20px;

overflow:hidden;

margin-top:20px;

}

.progress-bar{

width:0%;

height:25px;

background:green;

text-align:center;

line-height:25px;

color:white;

}

table{

width:100%;

margin-top:20px;

border-collapse:collapse;

}

table,
th,
td{

border:1px solid #ccc;

}

th{

background:#0066ff;

color:white;

}

th,
td{

padding:10px;

text-align:center;

}

.present{

color:green;

font-weight:bold;

}

.absent{

color:red;

font-weight:bold;

}

.pending{

color:orange;

font-weight:bold;

}

img{

border-radius:50%;

}

footer{

margin-top:30px;

text-align:center;

padding:15px;

background:#0066ff;

color:white;

}

</style>

</head>

<body>

<header>

<h1>

Smart Curriculum Activity And Attendance App

</h1>

</header>

<div class="container">

<button onclick="toggleDarkMode()">

Dark Mode

</button>

<button onclick="logout()">

Logout

</button>

<h3 id="dateTime"></h3>

<div class="notice">

Submit Attendance Before 5 PM

</div>

<div class="dashboard">

<div class="card">

<h2 id="totalStudents">

0

</h2>

<p>

Total Students

</p>

</div>

<div class="card">

<h2 id="presentStudents">

0

</h2>

<p>

Present Students

</p>

</div>

<div class="card">

<h2 id="absentStudents">

0

</h2>

<p>

Absent Students

</p>

</div>

<div class="card">

<h2 id="attendancePercent">

0%

</h2>

<p>

Attendance Percentage

</p>

</div>

</div>

<div class="progress">

<div class="progress-bar"
id="progressBar">

0%

</div>

</div>

<input type="text"
id="search"
placeholder="Search Student"
onkeyup="searchStudent()">

<input type="text"
id="studentName"
placeholder="Student Name">

<input type="text"
id="department"
placeholder="Department">

<input type="text"
id="studentId"
placeholder="Student ID">

<input type="email"
id="email"
placeholder="Student Email">

<select id="semester">

<option>

Semester 1

</option>

<option>

Semester 2

</option>

<option>

Semester 3

</option>

<option>

Semester 4

</option>

</select>

<input type="text"
id="activity"
placeholder="Curriculum Activity">

<textarea id="remarks"
placeholder="Remarks"></textarea>

<input type="file"
id="photo">

<button onclick="addStudent()">

Add Student

</button>

<button onclick="clearAllStudents()">

Clear All Students

</button>

<button onclick="resetAttendance()">

Reset Attendance

</button>

<button onclick="exportCSV()">

Export CSV

</button>

<button onclick="window.print()">

Download PDF

</button>

<table>

<thead>

<tr>

<th>Photo</th>

<th>Name</th>

<th>Department</th>

<th>ID</th>

<th>Email</th>

<th>Semester</th>

<th>Activity</th>

<th>Remarks</th>

<th>Status</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="studentTable">

</tbody>

</table>

</div>

<footer>

Smart Curriculum Activity Attendance App

</footer>

<script>

if(
localStorage.getItem("login")
!== "true"
){

window.location.href =
"login.html";

}

if(
localStorage.getItem(
"darkMode"
) === "enabled"
){

document.body.classList.add(
"dark-mode"
);

}

let students =
JSON.parse(
localStorage.getItem(
"students"
)
) || [];

displayStudents();

function addStudent(){

let name =
document.getElementById(
"studentName"
).value;

let department =
document.getElementById(
"department"
).value;

let id =
document.getElementById(
"studentId"
).value;

let email =
document.getElementById(
"email"
).value;

let semester =
document.getElementById(
"semester"
).value;

let activity =
document.getElementById(
"activity"
).value;

let remarks =
document.getElementById(
"remarks"
).value;

let photoInput =
document.getElementById(
"photo"
);

let file =
photoInput.files[0];

if(
name === ""
||
department === ""
||
id === ""
||
email === ""
||
activity === ""
||
remarks === ""
||
!file
){

alert(
"Please Fill All Fields"
);

return;

}

let reader =
new FileReader();

reader.onload =
function(e){

students.push({

name:name,

department:department,

id:id,

email:email,

semester:semester,

activity:activity,

remarks:remarks,

photo:e.target.result,

attendance:"Pending"

});

saveStudents();

displayStudents();

clearInputs();

alert(
"Student Added Successfully"
);

};

reader.readAsDataURL(file);

}

function displayStudents(filtered = students){

let table =
document.getElementById(
"studentTable"
);

table.innerHTML = "";

let present = 0;

let absent = 0;

filtered.forEach((student,index)=>{

let colorClass =
"pending";

if(
student.attendance ===
"Present"
){

colorClass =
"present";

present++;

}

if(
student.attendance ===
"Absent"
){

colorClass =
"absent";

absent++;

}

table.innerHTML += `

<tr>

<td>

<img src="${student.photo}"
width="50"
height="50">

</td>

<td>${student.name}</td>

<td>${student.department}</td>

<td>${student.id}</td>

<td>${student.email}</td>

<td>${student.semester}</td>

<td>${student.activity}</td>

<td>${student.remarks}</td>

<td class="${colorClass}">
${student.attendance}
</td>

<td>

<button onclick="markPresent(${index})">

Present

</button>

<button onclick="markAbsent(${index})">

Absent

</button>

<button onclick="editStudent(${index})">

Edit

</button>

<button onclick="deleteStudent(${index})">

Delete

</button>

<button onclick="sendMail('${student.email}')">

Mail

</button>

</td>

</tr>

`;

});

document.getElementById(
"totalStudents"
).innerHTML =
students.length;

document.getElementById(
"presentStudents"
).innerHTML =
present;

document.getElementById(
"absentStudents"
).innerHTML =
absent;

let percentage = 0;

if(
students.length > 0
){

percentage =
(
present /
students.length
) * 100;

}

document.getElementById(
"attendancePercent"
).innerHTML =
percentage.toFixed(0)
+ "%";

document.getElementById(
"progressBar"
).style.width =
percentage + "%";

document.getElementById(
"progressBar"
).innerHTML =
percentage.toFixed(0)
+ "%";

}

function markPresent(index){

students[index].attendance =
"Present";

saveStudents();

displayStudents();

}

function markAbsent(index){

students[index].attendance =
"Absent";

saveStudents();

displayStudents();

}

function editStudent(index){

let newName =
prompt(
"Enter New Name",
students[index].name
);

if(newName !== null){

students[index].name =
newName;

saveStudents();

displayStudents();

}

}

function deleteStudent(index){

students.splice(index,1);

saveStudents();

displayStudents();

}

function sendMail(email){

window.location.href =
"mailto:" + email;

}

function saveStudents(){

localStorage.setItem(

"students",

JSON.stringify(students)

);

}

function clearInputs(){

document.getElementById(
"studentName"
).value = "";

document.getElementById(
"department"
).value = "";

document.getElementById(
"studentId"
).value = "";

document.getElementById(
"email"
).value = "";

document.getElementById(
"activity"
).value = "";

document.getElementById(
"remarks"
).value = "";

document.getElementById(
"photo"
).value = "";

}

function clearAllStudents(){

students = [];

saveStudents();

displayStudents();

}

function resetAttendance(){

students.forEach((student)=>{

student.attendance =
"Pending";

});

saveStudents();

displayStudents();

}

function searchStudent(){

let value =
document.getElementById(
"search"
).value.toLowerCase();

let filtered =
students.filter((student)=>

student.name
.toLowerCase()
.includes(value)

||

student.department
.toLowerCase()
.includes(value)

||

student.id
.toLowerCase()
.includes(value)

);

displayStudents(filtered);

}

function exportCSV(){

let csv =
"Name,Department,ID,Email,Semester,Activity,Remarks,Attendance\n";

students.forEach((student)=>{

csv +=
student.name + "," +
student.department + "," +
student.id + "," +
student.email + "," +
student.semester + "," +
student.activity + "," +
student.remarks + "," +
student.attendance + "\n";

});

let blob =
new Blob([csv],{

type:"text/csv"

});

let url =
window.URL.createObjectURL(blob);

let a =
document.createElement("a");

a.href = url;

a.download =
"attendance.csv";

a.click();

}

function toggleDarkMode(){

document.body.classList.toggle(
"dark-mode"
);

if(
document.body.classList.contains(
"dark-mode"
)
){

localStorage.setItem(
"darkMode",
"enabled"
);

}

else{

localStorage.setItem(
"darkMode",
"disabled"
);

}

}

function logout(){

localStorage.removeItem(
"login"
);

window.location.href =
"login.html";

}

function updateDateTime(){

let now =
new Date();

document.getElementById(
"dateTime"
).innerHTML =
now.toLocaleString();

}

setInterval(
updateDateTime,
1000
);

updateDateTime();

</script>

</body>

</html>
