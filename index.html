<!DOCTYPE html>
<html>

<head>

  <title>Smart Attendance App</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Smart Attendance App</h1>

<button onclick="toggleDarkMode()">
🌙 Dark Mode
</button>

<br><br>

<input
type="text"
id="studentName"
placeholder="Enter student name">

<br><br>

<select id="activity">

<option>Sports</option>
<option>Dance</option>
<option>Music</option>
<option>Yoga</option>
<option>NCC</option>

</select>

<br><br>

<button onclick="markAttendance('Present')">
Present
</button>

<button onclick="markAttendance('Absent')">
Absent
</button>

<br><br>

<input
type="text"
id="searchInput"
placeholder="Search student"
onkeyup="searchStudent()">

<br><br>

<button onclick="downloadReport()">
Download Report
</button>

<div class="dashboard">

<div class="card blue">
<h2 id="totalStudents">0</h2>
<p>Total Students</p>
</div>

<div class="card green">
<h2 id="presentCount">0</h2>
<p>Present</p>
</div>

<div class="card red">
<h2 id="absentCount">0</h2>
<p>Absent</p>
</div>

<div class="card purple">
<h2 id="attendancePercentage">0%</h2>
<p>Attendance %</p>
</div>

</div>

<ul id="attendanceList"></ul>

</div>

<script src="script.js"></script>

</body>

</html>
