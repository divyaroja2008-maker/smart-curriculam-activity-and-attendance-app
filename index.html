<!DOCTYPE html>
<html>
<head>
  <title>Smart Curriculum App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Smart Curriculum & Attendance App</h1>

    <!-- ADD STUDENT -->
    <div class="card">
      <input type="text" id="studentName" placeholder="Enter student name">
      <button onclick="addStudent()">Add Student</button>
    </div>

    <!-- SEARCH -->
    <div class="card">
      <input type="text" id="searchBox" placeholder="Search student..." onkeyup="searchStudent()">
    </div>

    <!-- STUDENT LIST -->
    <div id="studentList"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
