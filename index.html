<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Smart Attendance App
    </title>

    <style>

        body {

            font-family: Arial;

            margin: 0;

            padding: 20px;

            background: #f2f2f2;

            transition: 0.3s;
        }

        .dark-mode {

            background: #121212;

            color: white;
        }

        .container {

            background: white;

            padding: 20px;

            border-radius: 10px;

            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .dark-mode .container {

            background: #1e1e1e;
        }

        h1 {

            text-align: center;

            color: blue;
        }

        input,
        button,
        textarea {

            width: 100%;

            padding: 10px;

            margin-top: 10px;

            border-radius: 5px;

            border: 1px solid #ccc;

            box-sizing: border-box;
        }

        button {

            background: blue;

            color: white;

            border: none;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {

            background: darkblue;

            transform: scale(1.03);
        }

        .dashboard {

            display: flex;

            gap: 10px;

            flex-wrap: wrap;

            margin-top: 20px;
        }

        .card {

            flex: 1;

            min-width: 180px;

            background: blue;

            color: white;

            padding: 15px;

            border-radius: 10px;

            text-align: center;
        }

        .notice {

            background: orange;

            color: white;

            padding: 10px;

            border-radius: 5px;

            margin-top: 15px;
        }

        table {

            width: 100%;

            margin-top: 20px;

            border-collapse: collapse;
        }

        table,
        th,
        td {

            border: 1px solid black;
        }

        th {

            background: blue;

            color: white;
        }

        th,
        td {

            padding: 10px;

            text-align: center;
        }

        .present {

            color: green;

            font-weight: bold;
        }

        .absent {

            color: red;

            font-weight: bold;
        }

        .progress {

            width: 100%;

            background: #ddd;

            border-radius: 10px;

            overflow: hidden;

            margin-top: 20px;
        }

        .progress-bar {

            width: 0%;

            height: 25px;

            background: green;

            color: white;

            text-align: center;

            line-height: 25px;
        }

        img {

            border-radius: 50%;
        }

        @media screen and (max-width: 600px) {

            .dashboard {

                flex-direction: column;
            }

            table {

                font-size: 12px;
            }
        }

    </style>

</head>

<body>

    <div class="container">

        <button onclick="logout()">

            Logout

        </button>

        <h1>

            Smart Curriculum Activity And Attendance App

        </h1>

        <h3>

            Welcome Admin

        </h3>

        <h4 id="dateTime"></h4>

        <button onclick="toggleDarkMode()">

            Dark Mode

        </button>

        <div class="notice">

            Submit Attendance Before 5 PM

        </div>

        <div class="dashboard">

            <div class="card">

                <h3>
                    Admin Profile
                </h3>

                <p>
                    Name: Admin
                </p>

                <p>
                    Role: Attendance Manager
                </p>

            </div>

            <div class="card">

                <h3 id="total">

                    Total Students: 0

                </h3>

            </div>

            <div class="card">

                <h3 id="present">

                    Present: 0

                </h3>

            </div>

            <div class="card">

                <h3 id="absent">

                    Absent: 0

                </h3>

            </div>

            <div class="card">

                <h3 id="percentage">

                    Attendance %: 0%

                </h3>

            </div>

        </div>

        <div class="progress">

            <div class="progress-bar"
                id="progressBar">

                0%

            </div>

        </div>

        <input type="text"
            id="search"
            placeholder="Search Student"
            onkeyup="searchStudent()">

        <input type="text"
            id="studentName"
            placeholder="Student Name">

        <input type="text"
            id="department"
            placeholder="Department">

        <input type="text"
            id="studentId"
            placeholder="Student ID">

        <input type="email"
            id="email"
            placeholder="Student Email">

        <input type="text"
            id="activity"
            placeholder="Curriculum Activity">

        <textarea id="remarks"
            placeholder="Remarks"></textarea>

        <input type="file"
            id="studentPhoto">

        <button onclick="addStudent()">

            Add Student

        </button>

        <button onclick="clearAllStudents()">

            Clear All Students

        </button>

        <button onclick="resetAttendance()">

            Reset Attendance

        </button>

        <button onclick="exportCSV()">

            Export CSV

        </button>

        <button onclick="window.print()">

            Download PDF

        </button>

        <table>

            <thead>

                <tr>

                    <th>Photo</th>

                    <th>Name</th>

                    <th>Department</th>

                    <th>ID</th>

                    <th>Email</th>

                    <th>Activity</th>

                    <th>Remarks</th>

                    <th>Attendance</th>

                    <th>Percentage</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="studentTable">

            </tbody>

        </table>

    </div>

    <script>

        if (
            localStorage.getItem("login")
            !== "true"
        ) {

            window.location.href =
                "login.html";
        }

        if (
            localStorage.getItem(
                "darkMode"
            ) === "enabled"
        ) {

            document.body.classList.add(
                "dark-mode"
            );
        }

        let students =
            JSON.parse(
                localStorage.getItem(
                    "students"
                )
            ) || [];

        displayStudents();

        function addStudent() {

            let name =
                document.getElementById(
                    "studentName"
                ).value;

            let department =
                document.getElementById(
                    "department"
                ).value;

            let studentId =
                document.getElementById(
                    "studentId"
                ).value;

            let email =
                document.getElementById(
                    "email"
                ).value;

            let activity =
                document.getElementById(
                    "activity"
                ).value;

            let remarks =
                document.getElementById(
                    "remarks"
                ).value;

            let photoInput =
                document.getElementById(
                    "studentPhoto"
                );

            let file =
                photoInput.files[0];

            if (
                name === ""
                ||
                department === ""
                ||
                studentId === ""
                ||
                email === ""
                ||
                activity === ""
                ||
                remarks === ""
                ||
                !file
            ) {

                alert(
                    "Fill All Fields"
                );

                return;
            }

            let reader =
                new FileReader();

            reader.onload =
                function(e) {

                    students.push({

                        name: name,

                        department: department,

                        id: studentId,

                        email: email,

                        activity: activity,

                        remarks: remarks,

                        photo: e.target.result,

                        attendance: "Not Marked",

                        percentage: 0
                    });

                    saveData();

                    displayStudents();

                    clearInputs();

                    alert(
                        "Student Added"
                    );
                };

            reader.readAsDataURL(file);
        }

        function displayStudents(filtered = students) {

            let table =
                document.getElementById(
                    "studentTable"
                );

            table.innerHTML = "";

            let presentCount = 0;

            let absentCount = 0;

            filtered.forEach((student, index) => {

                let colorClass = "";

                if (
                    student.attendance === "Present"
                ) {

                    colorClass = "present";

                    presentCount++;
                }

                if (
                    student.attendance === "Absent"
                ) {

                    colorClass = "absent";

                    absentCount++;
                }

                table.innerHTML += `

                <tr>

                    <td>

                        <img src="${student.photo}"
                        width="50"
                        height="50">

                    </td>

                    <td>${student.name}</td>

                    <td>${student.department}</td>

                    <td>${student.id}</td>

                    <td>${student.email}</td>

                    <td>${student.activity}</td>

                    <td>${student.remarks}</td>

                    <td class="${colorClass}">
                        ${student.attendance}
                    </td>

                    <td>
                        ${student.percentage}%
                    </td>

                    <td>

                        <button onclick="markPresent(${index})">

                            Present

                        </button>

                        <button onclick="markAbsent(${index})">

                            Absent

                        </button>

                        <button onclick="editStudent(${index})">

                            Edit

                        </button>

                        <button onclick="deleteStudent(${index})">

                            Delete

                        </button>

                        <a href="mailto:${student.email}">

                            <button>

                                Mail

                            </button>

                        </a>

                    </td>

                </tr>
                `;
            });

            document.getElementById(
                "total"
            ).innerHTML =
                "Total Students: "
                + students.length;

            document.getElementById(
                "present"
            ).innerHTML =
                "Present: "
                + presentCount;

            document.getElementById(
                "absent"
            ).innerHTML =
                "Absent: "
                + absentCount;

            let percentage = 0;

            if (
                students.length > 0
            ) {

                percentage =
                    (
                        presentCount /
                        students.length
                    ) * 100;
            }

            document.getElementById(
                "percentage"
            ).innerHTML =
                "Attendance %: "
                + percentage.toFixed(2)
                + "%";

            document.getElementById(
                "progressBar"
            ).style.width =
                percentage + "%";

            document.getElementById(
                "progressBar"
            ).innerHTML =
                percentage.toFixed(0)
                + "%";
        }

        function markPresent(index) {

            students[index].attendance =
                "Present";

            students[index].percentage =
                100;

            saveData();

            displayStudents();
        }

        function markAbsent(index) {

            students[index].attendance =
                "Absent";

            students[index].percentage =
                0;

            saveData();

            displayStudents();
        }

        function editStudent(index) {

            let newName =
                prompt(
                    "Enter New Name",
                    students[index].name
                );

            if (newName !== null) {

                students[index].name =
                    newName;

                saveData();

                displayStudents();
            }
        }

        function deleteStudent(index) {

            students.splice(index, 1);

            saveData();

            displayStudents();
        }

        function resetAttendance() {

            students.forEach((student) => {

                student.attendance =
                    "Not Marked";

                student.percentage =
                    0;
            });

            saveData();

            displayStudents();
        }

        function clearInputs() {

            document.getElementById(
                "studentName"
            ).value = "";

            document.getElementById(
                "department"
            ).value = "";

            document.getElementById(
                "studentId"
            ).value = "";

            document.getElementById(
                "email"
            ).value = "";

            document.getElementById(
                "activity"
            ).value = "";

            document.getElementById(
                "remarks"
            ).value = "";

            document.getElementById(
                "studentPhoto"
            ).value = "";
        }

        function saveData() {

            localStorage.setItem(

                "students",

                JSON.stringify(students)
            );
        }

        function clearAllStudents() {

            students = [];

            saveData();

            displayStudents();
        }

        function searchStudent() {

            let value =
                document.getElementById(
                    "search"
                ).value.toLowerCase();

            let filtered =
                students.filter((student) =>

                    student.name
                    .toLowerCase()
                    .includes(value)

                    ||

                    student.department
                    .toLowerCase()
                    .includes(value)
                );

            displayStudents(filtered);
        }

        function toggleDarkMode() {

            document.body.classList.toggle(
                "dark-mode"
            );

            if (
                document.body.classList.contains(
                    "dark-mode"
                )
            ) {

                localStorage.setItem(
                    "darkMode",
                    "enabled"
                );
            }

            else {

                localStorage.setItem(
                    "darkMode",
                    "disabled"
                );
            }
        }

        function logout() {

            localStorage.removeItem(
                "login"
            );

            window.location.href =
                "login.html";
        }

        function updateDateTime() {

            let now = new Date();

            document.getElementById(
                "dateTime"
            ).innerHTML =
                now.toLocaleString();
        }

        setInterval(
            updateDateTime,
            1000
        );

        updateDateTime();

        function exportCSV() {

            let csv =
                "Name,Department,ID,Email,Activity,Remarks,Attendance,Percentage\n";

            students.forEach((student) => {

                csv +=
                    student.name + "," +
                    student.department + "," +
                    student.id + "," +
                    student.email + "," +
                    student.activity + "," +
                    student.remarks + "," +
                    student.attendance + "," +
                    student.percentage + "%\n";
            });

            let blob =
                new Blob([csv], {
                    type: "text/csv"
                });

            let url =
                window.URL.createObjectURL(blob);

            let a =
                document.createElement("a");

            a.href = url;

            a.download =
                "attendance.csv";

            a.click();
        }

    </script>

</body>

</html>
