<!-- SMART TIMETABLE GENERATOR SECTION -->

<div class="card">

<h2>
Smart Timetable Generator
</h2>

<input type="text"
id="teacherName"
placeholder="Teacher Name">

<input type="text"
id="subjectName"
placeholder="Subject Name">

<input type="text"
id="classRoom"
placeholder="Class Room">

<select id="day">

<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>

</select>

<select id="timeSlot">

<option>9:00 AM - 10:00 AM</option>
<option>10:00 AM - 11:00 AM</option>
<option>11:00 AM - 12:00 PM</option>
<option>1:00 PM - 2:00 PM</option>
<option>2:00 PM - 3:00 PM</option>

</select>

<button onclick="addTimetable()">

Generate Timetable

</button>

<table>

<thead>

<tr>

<th>Teacher</th>
<th>Subject</th>
<th>Room</th>
<th>Day</th>
<th>Time</th>
<th>Action</th>

</tr>

</thead>

<tbody id="timetableTable">

</tbody>

</table>

</div>

<script>

let timetable =
JSON.parse(
localStorage.getItem(
"timetable"
)
) || [];

displayTimetable();

function addTimetable(){

let teacher =
document.getElementById(
"teacherName"
).value;

let subject =
document.getElementById(
"subjectName"
).value;

let room =
document.getElementById(
"classRoom"
).value;

let day =
document.getElementById(
"day"
).value;

let time =
document.getElementById(
"timeSlot"
).value;

if(
teacher === ""
||
subject === ""
||
room === ""
){

alert(
"Please Fill All Fields"
);

return;

}

let clash =
timetable.find((item)=>

item.teacher === teacher
&&
item.day === day
&&
item.time === time

);

if(clash){

alert(
"Teacher Already Assigned At This Time"
);

return;

}

timetable.push({

teacher:teacher,
subject:subject,
room:room,
day:day,
time:time

});

saveTimetable();

displayTimetable();

clearTimetableInputs();

alert(
"Timetable Generated Successfully"
);

}

function displayTimetable(){

let table =
document.getElementById(
"timetableTable"
);

table.innerHTML = "";

timetable.forEach((item,index)=>{

table.innerHTML += `

<tr>

<td>${item.teacher}</td>
<td>${item.subject}</td>
<td>${item.room}</td>
<td>${item.day}</td>
<td>${item.time}</td>

<td>

<button onclick="deleteTimetable(${index})">

Delete

</button>

</td>

</tr>

`;

});

}

function deleteTimetable(index){

timetable.splice(index,1);

saveTimetable();

displayTimetable();

}

function saveTimetable(){

localStorage.setItem(

"timetable",

JSON.stringify(timetable)

);

}

function clearTimetableInputs(){

document.getElementById(
"teacherName"
).value = "";

document.getElementById(
"subjectName"
).value = "";

document.getElementById(
"classRoom"
).value = "";

}

</script>
