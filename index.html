<!DOCTYPE html>
<html>

<head>

  <title>Smart Attendance App</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Smart Attendance App</h1>

<button onclick="toggleDarkMode()">
🌙 Dark Mode
</button>

<br><br>

<input
type="text"
id="studentName"
placeholder="Enter student name">

<br><br>

<select id="activity">

<option>Sports</option>
<option>Dance</option>
<option>Music</option>
<option>Yoga</option>
<option>NCC</option>

</select>

<br><br>

<button onclick="markAttendance('Present')">
Present
</button>

<button onclick="markAttendance('Absent')">
Absent
</button>

<br><br>

<input
type="text"
id="searchInput"
placeholder="Search student"
onkeyup="searchStudent()">

<br><br>

<button onclick="downloadReport()">
Download Report
</button>

<h3 id="totalStudents">
Total Students: 0
</h3>

<ul id="attendanceList"></ul>

</div>

<script src="script.js"></script>

</body>

</html>
