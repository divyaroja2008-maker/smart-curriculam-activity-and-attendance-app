<input type="text" id="studentName" placeholder="Enter Student Name">

<select id="activity">
    <option>Sports</option>
    <option>NSS</option>
    <option>NCC</option>
    <option>Yoga</option>
</select>

<button onclick="markAttendance('Present')">Present</button>
<button onclick="markAttendance('Absent')">Absent</button>

<h3>Total Students: <span id="totalStudents">0</span></h3>
<h3>Present: <span id="presentCount">0</span></h3>
<h3>Absent: <span id="absentCount">0</span></h3>
<h3>Attendance %: <span id="attendancePercent">0%</span></h3>

<table border="1">
    <thead>
        <tr>
            <th>Name</th>
            <th>Activity</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="attendanceTable"></tbody>
</table>
